# HashiCorp Vault Helm Chart Values — Shared Base
# Environment-specific overrides: values-local.yaml (dev) or values-live.yaml (prod)
# Chart version: 0.32.0 | Vault version: 1.21.0

global:
  enabled: true
  tlsDisable: true  # Must match tls_disable in standalone config below

injector:
  enabled: true
  replicas: 1

  image:
    repository: hashicorp/vault-k8s
    tag: 1.5.0

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

server:
  image:
    repository: hashicorp/vault
    tag: 1.21.0 # Pin to exact version, never use 'latest'

  # CRITICAL: OnDelete prevents automatic pod restarts during upgrades
  # Vault pods must be manually deleted to control unseal sequence
  updateStrategyType: OnDelete

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi # Increased for multi-engine stability (Transit, PKI, DB)

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204

  livenessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 5
    timeoutSeconds: 5

  # Enable process namespace sharing for better signal handling
  shareProcessNamespace: true

  # Security contexts - run as non-root with minimal capabilities
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        add:
          - IPC_LOCK # Required for mlock() to prevent secrets from swapping to disk

  # High Availability configuration - DISABLED for single-node MicroK8s
  # To enable HA, ensure you have 3+ nodes and set ha.enabled: true
  ha:
    enabled: false

  # Standalone mode configuration for single-node dev/test
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = true  # Disable for initial setup — enable after cert-manager is configured
        # tls_cert_file = "/vault/tls/tls.crt"
        # tls_key_file  = "/vault/tls/tls.key"
      }

      storage "file" {
        path = "/vault/data"
      }

      # NOTE: service_registration "kubernetes" {} is NOT compatible with
      # file storage (standalone mode). Only enable with HA backends (Raft/Consul).

      telemetry {
        prometheus_retention_time = "30s"
        disable_hostname = true
      }

  # Data storage — sizes and storageClass set per-environment
  dataStorage:
    enabled: true
    accessMode: ReadWriteOnce

  # Audit storage — sizes and storageClass set per-environment
  auditStorage:
    enabled: true
    accessMode: ReadWriteOnce

  # Init container for volume permissions — set per-environment
  # MicroK8s needs fix-permissions (see values-live.yaml)
  # Minikube handles permissions natively (see values-local.yaml)

  # Node affinity - CRITICAL when using local-path StorageClass
  # Uncomment and configure for multi-node clusters to pin pods to specific nodes
  # affinity: |
  #   podAntiAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       - labelSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: vault
  #         topologyKey: kubernetes.io/hostname

  # Service configuration
  service:
    enabled: true
    type: ClusterIP # Change to NodePort or LoadBalancer for external access
    # For NodePort:
    # type: NodePort
    # nodePort: 30820
    # For LoadBalancer (requires MetalLB):
    # type: LoadBalancer
    # loadBalancerIP: 192.168.1.100

  # Internal service for StatefulSet pod DNS
  serviceInternal:
    enabled: true

  # Ingress — reverse proxy entry point for local network access
  # TLS termination at the ingress layer; backend talks HTTP to ClusterIP service
  # Requires: microk8s enable ingress (Nginx Ingress Controller)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"           # No upload size limit (for large secret payloads)
      nginx.ingress.kubernetes.io/proxy-read-timeout: "900"      # Long timeout for batch operations
      nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
    hosts:
      - host: vault.local
    tls:
      - secretName: vault-tls
        hosts:
          - vault.local

ui:
  enabled: true
  serviceType: ClusterIP
  # Expose via Ingress or kubectl port-forward

# TLS configuration
# Mount TLS certificates from cert-manager Secret
serverTelemetry:
  serviceMonitor:
    enabled: false # Set to true if using Prometheus Operator