apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: microk8s-hostpath-immediate
provisioner: microk8s.io/hostpath
volumeBindingMode: Immediate  # Bind PVCs immediately, not waiting for pod
reclaimPolicy: Retain  # IMPORTANT: Preserves PV data when PVCs are deleted
allowVolumeExpansion: true
