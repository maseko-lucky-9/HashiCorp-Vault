name: Rollback Vault

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 'Helm revision number to rollback to'
        required: true
        type: number

jobs:
  rollback:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'
      
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.0'
      
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Show Helm history
        run: |
          echo "Current Helm releases:"
          helm history vault -n vault
      
      - name: Rollback Vault
        run: |
          helm rollback vault ${{ github.event.inputs.revision }} -n vault
      
      - name: Verify rollback
        run: |
          kubectl get pods -n vault
          kubectl exec vault-0 -n vault -- vault status || true
      
      - name: Post-rollback checks
        run: |
          echo "Checking seal status..."
          for i in 0 1 2; do
            echo "vault-$i:"
            kubectl exec vault-$i -n vault -- vault status || true
          done
