name: Deploy Vault

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - 'argocd/**'
      - 'manifests/**'
      - 'policies/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yaml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Add HashiCorp Helm repo
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
      
      - name: Validate Helm values
        run: |
          helm template vault hashicorp/vault \
            --version 0.32.0 \
            -f helm/vault/values.yaml \
            --namespace vault \
            > /tmp/rendered.yaml
          echo "✅ Helm values validation successful"
  
  deploy:
    runs-on: self-hosted
    needs: validate
    environment: production  # Requires manual approval in GitHub Settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Add HashiCorp Helm repo
        run: helm repo add hashicorp https://helm.releases.hashicorp.com
      
      - name: Deploy Vault
        run: |
          helm upgrade --install vault hashicorp/vault \
            --version 0.32.0 \
            --namespace vault \
            --create-namespace \
            -f helm/vault/values.yaml \
            --wait \
            --timeout 10m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n vault
          kubectl exec vault-0 -n vault -- vault status || true
  
  smoke-test:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq
      
      
      - name: Check Vault pods are running
        run: |
          echo "Checking Vault pod status..."
          kubectl get pods -n vault
          
          # Count running Vault server pods
          RUNNING_PODS=$(kubectl get pods -n vault -l app.kubernetes.io/name=vault,component=server --field-selector=status.phase=Running --no-headers | wc -l)
          
          if [ "$RUNNING_PODS" -lt 3 ]; then
            echo "ERROR: Expected 3 running Vault pods, got $RUNNING_PODS"
            exit 1
          fi
          
          echo "✅ All 3 Vault pods are running"
      
      - name: Check Vault StatefulSet
        run: |
          echo "Checking Vault StatefulSet configuration..."
          kubectl get statefulset vault -n vault -o json | jq '{
            replicas: .spec.replicas,
            ready: .status.readyReplicas,
            storage: .spec.volumeClaimTemplates[0].spec.storageClassName
          }'
          
          # Verify StatefulSet is using correct StorageClass
          STORAGE_CLASS=$(kubectl get statefulset vault -n vault -o jsonpath='{.spec.volumeClaimTemplates[0].spec.storageClassName}')
          
          if [ "$STORAGE_CLASS" != "microk8s-hostpath-immediate" ]; then
            echo "ERROR: Expected storageClass=microk8s-hostpath-immediate, got $STORAGE_CLASS"
            exit 1
          fi
          
          echo "✅ Vault deployment successful with correct StorageClass"
