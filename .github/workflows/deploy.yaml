name: Deploy Vault

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - 'argocd/**'
      - 'manifests/**'
      - 'policies/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yaml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Add HashiCorp Helm repo
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
      
      - name: Validate Helm values
        run: |
          helm template vault hashicorp/vault \
            --version 0.32.0 \
            -f helm/vault/values.yaml \
            --namespace vault \
            > /tmp/rendered.yaml
          echo "✅ Helm values validation successful"
  
  deploy:
    runs-on: self-hosted
    needs: validate
    environment: production  # Requires manual approval in GitHub Settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Add HashiCorp Helm repo
        run: helm repo add hashicorp https://helm.releases.hashicorp.com
      
      - name: Deploy Vault
        run: |
          helm upgrade --install vault hashicorp/vault \
            --version 0.32.0 \
            --namespace vault \
            --create-namespace \
            -f helm/vault/values.yaml \
            --wait \
            --timeout 10m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n vault
          kubectl exec vault-0 -n vault -- vault status || true
  
  smoke-test:
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Check Vault status
        run: |
          STATUS=$(kubectl exec vault-0 -n vault -- vault status -format=json || echo '{}')
          echo "$STATUS" | jq .
          
          # Verify storage type is raft
          STORAGE=$(echo "$STATUS" | jq -r '.storage_type // "unknown"')
          if [ "$STORAGE" != "raft" ]; then
            echo "ERROR: Expected storage_type=raft, got $STORAGE"
            exit 1
          fi
          
          echo "✅ Vault deployment successful"
