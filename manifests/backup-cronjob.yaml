apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-backup
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-backup
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-backup
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-backup
subjects:
  - kind: ServiceAccount
    name: vault-backup
    namespace: vault
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-backup
  namespace: vault
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: vault-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: bitnami/kubectl:1.31
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="vault-data-backup-${TIMESTAMP}.tar.gz"
                  
                  # Standalone mode uses file storage — backup via tar
                  echo "Creating file-storage backup..."
                  kubectl exec -n vault vault-0 -c vault -- \
                    tar czf "/tmp/${BACKUP_FILE}" -C /vault/data .
                  
                  echo "Copying backup from pod..."
                  kubectl cp "vault/vault-0:/tmp/${BACKUP_FILE}" "/backups/${BACKUP_FILE}"
                  
                  # Clean up temp file in pod
                  kubectl exec -n vault vault-0 -c vault -- rm -f "/tmp/${BACKUP_FILE}"
                  
                  # Prune local backups older than 7 days
                  echo "Pruning backups older than 7 days..."
                  find /backups -name "vault-data-backup-*.tar.gz" -mtime +7 -delete 2>/dev/null || true
                  
                  # Upload to S3 if configured
                  if [ -n "${S3_BUCKET:-}" ]; then
                    echo "Uploading to S3..."
                    aws s3 cp "/backups/${BACKUP_FILE}" "${S3_BUCKET}/${BACKUP_FILE}"
                  else
                    echo "⚠️  S3_BUCKET not configured — backup stored locally only"
                  fi
                  
                  echo "✅ Backup complete: ${BACKUP_FILE}"
                  ls -lh /backups/vault-data-backup-*.tar.gz | tail -5
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              env:
                - name: S3_BUCKET
                  value: ""  # Set to your S3 bucket URI (e.g. s3://my-vault-backups)
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            # hostPath provides persistent local storage for backups.
            # For production, configure S3_BUCKET for off-site redundancy.
            - name: backups
              hostPath:
                path: /var/backups/vault
                type: DirectoryOrCreate
