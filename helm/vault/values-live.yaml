# Live (Production) Environment Overrides (Ubuntu + MicroK8s)
# Layer on top of values.yaml: helm template -f values.yaml -f values-live.yaml
# Chart version: 0.32.0 | Vault version: 1.21.0

# ── Storage ──────────────────────────────────────────────────────────────────
# MicroK8s requires the custom 'microk8s-hostpath-immediate' StorageClass
# with Immediate binding to avoid WaitForFirstConsumer deadlock.

server:
  dataStorage:
    size: 10Gi
    storageClass: "microk8s-hostpath-immediate"

  auditStorage:
    size: 5Gi
    storageClass: "microk8s-hostpath-immediate"

  # ── Init Container ──────────────────────────────────────────────────────
  # MicroK8s hostpath provisioner creates volumes owned by root (0:0).
  # Vault runs as uid 100, gid 1000 — must chown before Vault starts.
  extraInitContainers:
    - name: fix-permissions
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Fixing volume permissions..."
          chown -R 100:1000 /vault/data
          chown -R 100:1000 /vault/audit
          chmod -R 755 /vault/data
          chmod -R 755 /vault/audit
          echo "Permissions fixed successfully"
      volumeMounts:
        - name: data
          mountPath: /vault/data
        - name: audit
          mountPath: /vault/audit
      securityContext:
        runAsUser: 0  # Must run as root to chown
        runAsNonRoot: false
