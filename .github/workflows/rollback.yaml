name: Rollback Vault

on:
  workflow_dispatch:
    inputs:
      revision:
        description: 'Helm revision number to rollback to'
        required: true
        type: number

jobs:
  rollback:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Show Helm history
        run: |
          echo "Current Helm releases:"
          helm history vault -n vault
      
      - name: Rollback Vault
        run: |
          helm rollback vault ${{ github.event.inputs.revision }} -n vault
      
      - name: Verify rollback
        run: |
          kubectl get pods -n vault
          kubectl exec vault-0 -n vault -- vault status || true
      
      - name: Post-rollback checks
        run: |
          echo "Checking seal status (standalone mode)..."
          echo "vault-0:"
          kubectl exec vault-0 -n vault -- vault status || true
